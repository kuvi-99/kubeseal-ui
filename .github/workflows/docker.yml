name: Build and push Docker image

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'

env:
  IMAGE: ghcr.io/kuvi-99/kubeseal-ui

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.run_number }}

      - name: Update image tag in k8s/deployment.yaml
        run: |
          sed -i "s|image: ${IMAGE}:.*|image: ${IMAGE}:${{ github.run_number }}|" k8s/deployment.yaml

      - name: Commit updated deployment
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update image tag to ${{ github.run_number }}"
          file_pattern: k8s/deployment.yaml
