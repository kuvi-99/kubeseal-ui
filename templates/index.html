<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kubeseal-ui</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #0d1117;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 55%);
      min-height: 100vh;
    }

    .card {
      background: rgba(22, 27, 34, 0.9);
      border: 1px solid rgba(99, 102, 241, 0.2);
      box-shadow:
        0 0 0 1px rgba(99, 102, 241, 0.05),
        0 8px 32px rgba(0, 0, 0, 0.4),
        0 0 80px rgba(99, 102, 241, 0.06);
    }

    textarea, .output-area {
      background: rgba(13, 17, 23, 0.8);
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: #e6edf3;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      resize: vertical;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea:focus {
      outline: none;
      border-color: rgba(99, 102, 241, 0.6);
      box-shadow:
        0 0 0 3px rgba(99, 102, 241, 0.12),
        0 0 20px rgba(99, 102, 241, 0.08);
    }

    .btn-encrypt {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
      transition: all 0.2s ease;
    }

    .btn-encrypt:hover:not(:disabled) {
      box-shadow: 0 6px 25px rgba(99, 102, 241, 0.5);
      transform: translateY(-1px);
    }

    .btn-encrypt:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-encrypt:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-copy {
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #a5b4fc;
      transition: all 0.15s ease;
    }

    .btn-copy:hover {
      background: rgba(99, 102, 241, 0.25);
      border-color: rgba(99, 102, 241, 0.5);
    }

    .btn-copy.copied {
      background: rgba(34, 197, 94, 0.15);
      border-color: rgba(34, 197, 94, 0.4);
      color: #86efac;
    }

    .output-area {
      display: none;
    }

    .output-area.visible {
      display: block;
    }

    .error-box {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .error-box.visible {
      display: block;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .label-text {
      color: #8b949e;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .glow-dot {
      width: 8px;
      height: 8px;
      background: #6366f1;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.8);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="card rounded-2xl p-8 w-full max-w-2xl">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-8">
      <div class="glow-dot"></div>
      <div>
        <h1 class="text-xl font-semibold text-white tracking-tight">kubeseal-ui</h1>
        <p class="text-xs text-gray-500 mt-0.5">Encrypt Kubernetes secrets with Sealed Secrets</p>
      </div>
    </div>

    <!-- Input -->
    <div class="mb-5">
      <label class="label-text block mb-2">Secret YAML</label>
      <textarea
        id="input"
        rows="12"
        class="w-full rounded-lg px-4 py-3"
        placeholder="apiVersion: v1
kind: Secret
metadata:
  name: my-secret
  namespace: my-namespace
type: Opaque
stringData:
  password: my-super-secret-value
  api-key: another-secret"
      ></textarea>
    </div>

    <!-- Encrypt button -->
    <button id="encryptBtn" onclick="encrypt()" class="btn-encrypt w-full py-3 rounded-xl text-white font-medium text-sm flex items-center justify-center gap-2">
      <div class="spinner" id="spinner"></div>
      <span id="btnText">Encrypt</span>
    </button>

    <!-- Error -->
    <div id="errorBox" class="error-box rounded-lg px-4 py-3 mt-4 text-sm font-mono whitespace-pre-wrap"></div>

    <!-- Output -->
    <div id="outputBlock" class="mt-6 hidden">
      <div class="flex items-center justify-between mb-2">
        <label class="label-text">Sealed Secret YAML</label>
        <button id="copyBtn" onclick="copyOutput()" class="btn-copy text-xs px-3 py-1.5 rounded-lg font-medium">
          Copy
        </button>
      </div>
      <pre id="output" class="output-area visible rounded-lg px-4 py-3 overflow-x-auto whitespace-pre-wrap break-all"></pre>
    </div>

  </div>

  <script>
    async function encrypt() {
      const input = document.getElementById('input').value.trim();
      const btn = document.getElementById('encryptBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const errorBox = document.getElementById('errorBox');
      const outputBlock = document.getElementById('outputBlock');
      const output = document.getElementById('output');

      errorBox.classList.remove('visible');
      outputBlock.classList.add('hidden');

      if (!input) {
        showError('Paste your Secret YAML first.');
        return;
      }

      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Encrypting…';

      try {
        const resp = await fetch('/encrypt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ secret_yaml: input }),
        });

        const data = await resp.json();

        if (!resp.ok) {
          showError(data.detail || `Error ${resp.status}`);
          return;
        }

        output.textContent = data.sealed_yaml;
        outputBlock.classList.remove('hidden');
      } catch (e) {
        showError('Network error: ' + e.message);
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Encrypt';
      }
    }

    function showError(msg) {
      const errorBox = document.getElementById('errorBox');
      errorBox.textContent = msg;
      errorBox.classList.add('visible');
    }

    async function copyOutput() {
      const text = document.getElementById('output').textContent;
      const btn = document.getElementById('copyBtn');
      await navigator.clipboard.writeText(text);
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    }

    // Ctrl+Enter to encrypt
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') encrypt();
    });
  </script>

</body>
</html>
