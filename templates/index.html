<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kubeseal-ui</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #0d1117;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 55%);
      min-height: 100vh;
    }

    .card {
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid rgba(99, 102, 241, 0.2);
      box-shadow: 0 0 0 1px rgba(99,102,241,0.05), 0 8px 32px rgba(0,0,0,0.5), 0 0 80px rgba(99,102,241,0.06);
    }

    .field {
      background: rgba(13, 17, 23, 0.8) !important;
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: #e6edf3 !important;
      -webkit-text-fill-color: #e6edf3 !important;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field:focus {
      outline: none;
      border-color: rgba(99,102,241,0.6);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12), 0 0 20px rgba(99,102,241,0.08);
    }
    .field::placeholder { color: #3d4451 !important; }

    .entry-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; }

    .yaml-block {
      font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 0.78rem;
      background: rgba(13,17,23,0.8);
      border: 1px solid rgba(99,102,241,0.15);
      color: #c9d1d9;
      line-height: 1.7;
    }
    .yaml-key { color: #79c0ff; }
    .yaml-enc { color: #ffd700; }
    .yaml-cmt { color: #484f58; }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      box-shadow: 0 4px 15px rgba(99,102,241,0.3);
      transition: all 0.2s;
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 25px rgba(99,102,241,0.5); transform: translateY(-1px); }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-add {
      border: 1px dashed rgba(99,102,241,0.35);
      color: #6366f1;
      transition: all 0.15s;
      background: transparent;
    }
    .btn-add:hover { border-color: rgba(99,102,241,0.7); background: rgba(99,102,241,0.07); }

    .btn-remove {
      color: #484f58;
      transition: color 0.15s;
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; line-height: 1; padding: 4px 6px;
    }
    .btn-remove:hover { color: #ef4444; }

    .btn-copy {
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      color: #a5b4fc;
      transition: all 0.15s;
      font-size: 0.72rem;
    }
    .btn-copy:hover { background: rgba(99,102,241,0.22); }
    .btn-copy.copied { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #86efac; }

    .error-box { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .label-text { color: #8b949e; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .glow-dot {
      width: 8px; height: 8px; background: #6366f1; border-radius: 50%;
      box-shadow: 0 0 10px rgba(99,102,241,0.9); animation: pulse 2s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    .hint { color: #30363d; font-size: 0.70rem; }
    .hint code { color: #484f58; font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="card rounded-2xl p-8 w-full max-w-2xl">

    <!-- Header -->
    <div class="flex items-center gap-3 mb-7">
      <div class="glow-dot"></div>
      <div>
        <h1 class="text-lg font-semibold text-white tracking-tight">kubeseal-ui</h1>
        <p class="text-xs text-gray-500 mt-0.5">Encrypt secret values for Sealed Secrets</p>
      </div>
    </div>

    <!-- Namespace + Secret name -->
    <div class="grid grid-cols-2 gap-3 mb-5">
      <div>
        <label class="label-text block mb-1.5">Namespace</label>
        <input id="namespace" type="text" class="field w-full rounded-lg px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="label-text block mb-1.5">Secret name</label>
        <input id="name" type="text" class="field w-full rounded-lg px-3 py-2 text-sm" />
      </div>
    </div>

    <!-- Column headers -->
    <div class="entry-row mb-2 px-1">
      <span class="label-text">Key name</span>
      <span class="label-text">Value</span>
      <span></span>
    </div>

    <!-- Entries -->
    <div id="entries" class="space-y-2 mb-3"></div>

    <!-- Add key button -->
    <button onclick="addRow()" class="btn-add w-full py-2 rounded-lg text-sm font-medium mb-5">+ Add key</button>

    <!-- Encrypt button -->
    <button id="encryptBtn" onclick="encrypt()"
      class="btn-primary w-full py-2.5 rounded-xl text-white font-medium text-sm flex items-center justify-center gap-2">
      <div class="spinner hidden" id="spinner"></div>
      <span id="btnText">Encrypt All</span>
    </button>

    <!-- Error -->
    <div id="errorBox" class="hidden error-box rounded-lg px-4 py-3 mt-4 text-sm font-mono whitespace-pre-wrap"></div>

    <!-- Output -->
    <div id="outputBlock" class="hidden mt-6">
      <div class="flex items-center justify-between mb-2">
        <label class="label-text">Add to values.yaml</label>
        <button id="copyBtn" onclick="copyYaml()" class="btn-copy px-3 py-1.5 rounded-lg font-medium">Copy YAML</button>
      </div>
      <pre id="yamlOutput" class="yaml-block rounded-lg px-4 py-3 overflow-x-auto whitespace-pre-wrap break-all"></pre>
      <p class="hint mt-2">Чтобы переменные попали в контейнер, добавь <code>envFrom: [{secretRef: {name: &lt;secret-name&gt;}}]</code> в блок containers.</p>
    </div>

  </div>

  <script>
    let rowId = 0;
    let lastYaml = '';

    function addRow(key = '', value = '') {
      const id = rowId++;
      const div = document.createElement('div');
      div.className = 'entry-row';
      div.id = `row-${id}`;
      div.innerHTML = `
        <input type="text" value="${escHtml(key)}"
          class="field rounded-lg px-3 py-2 text-sm" data-role="key" />
        <input type="text" value="${escHtml(value)}"
          class="field rounded-lg px-3 py-2 text-sm font-mono" data-role="value" />
        <button class="btn-remove" onclick="removeRow(${id})" title="Remove">×</button>
      `;
      document.getElementById('entries').appendChild(div);
    }

    function removeRow(id) {
      const el = document.getElementById(`row-${id}`);
      if (el) el.remove();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function getEntries() {
      return [...document.getElementById('entries').querySelectorAll('.entry-row')].map(row => ({
        key:   row.querySelector('[data-role=key]').value.trim(),
        value: row.querySelector('[data-role=value]').value,
      }));
    }

    function buildYaml(name, encrypted) {
      const lines = [
        'secrets:',
        '  sealed:',
        `    - name: ${name}`,
        '      encryptedData:',
        ...Object.entries(encrypted).map(([k, v]) => `        ${k}: ${v}`),
        '',
        '# Reference in container:',
        '# deployment:',
        '#   containers:',
        '#     - envFrom:',
        '#         - secretRef:',
        `#             name: ${name}`,
      ];
      return lines.join('\n');
    }

    function renderYaml(name, encrypted) {
      const raw = buildYaml(name, encrypted);
      lastYaml = raw;
      const el = document.getElementById('yamlOutput');
      el.innerHTML = raw
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/(secrets:|sealed:|encryptedData:|deployment:|containers:|envFrom:)/g, '<span class="yaml-key">$1</span>')
        .replace(/(- name:|name:|secretRef:)/g, '<span class="yaml-key">$1</span>')
        .replace(/(#.*)/g, '<span class="yaml-cmt">$1</span>');

      // highlight encrypted values (long base64 strings)
      Object.values(encrypted).forEach(v => {
        const safe = v.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        el.innerHTML = el.innerHTML.replace(new RegExp(safe, 'g'), `<span class="yaml-enc">${v}</span>`);
      });
    }

    async function encrypt() {
      const namespace = document.getElementById('namespace').value.trim();
      const name = document.getElementById('name').value.trim();
      const entries = getEntries();
      const btn = document.getElementById('encryptBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const errorBox = document.getElementById('errorBox');
      const outputBlock = document.getElementById('outputBlock');

      errorBox.classList.add('hidden');
      outputBlock.classList.add('hidden');

      if (!namespace) return showError('Namespace is required.');
      if (!name)      return showError('Secret name is required.');
      if (!entries.length) return showError('Add at least one key.');

      const emptyKey = entries.find(e => !e.key);
      if (emptyKey) return showError('Key name cannot be empty.');
      const emptyVal = entries.find(e => !e.value.trim());
      if (emptyVal) return showError(`Value for key "${emptyVal.key || '?'}" is empty.`);

      btn.disabled = true;
      spinner.classList.remove('hidden');
      btnText.textContent = 'Encrypting…';

      try {
        const resp = await fetch('/encrypt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ namespace, name, entries }),
        });
        const data = await resp.json();
        if (!resp.ok) { showError(data.detail || `Error ${resp.status}`); return; }

        renderYaml(name, data.encrypted);
        outputBlock.classList.remove('hidden');
      } catch (e) {
        showError('Network error: ' + e.message);
      } finally {
        btn.disabled = false;
        spinner.classList.add('hidden');
        btnText.textContent = 'Encrypt All';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorBox');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    async function copyYaml() {
      await navigator.clipboard.writeText(lastYaml);
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy YAML'; btn.classList.remove('copied'); }, 2000);
    }

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') encrypt();
    });

    // Start with one empty row
    addRow();
  </script>

</body>
</html>
